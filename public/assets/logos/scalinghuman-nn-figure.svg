<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Scaling Human">
  <!-- Full figure built as neural graph: head node + body nodes -->
  <g stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
    <!-- spine / structure -->
    <line x1="32" y1="18" x2="32" y2="34"/>
    <line x1="32" y1="34" x2="22" y2="48"/>
    <line x1="32" y1="34" x2="42" y2="48"/>
    <line x1="32" y1="26" x2="18" y2="30"/>
    <line x1="32" y1="26" x2="46" y2="30"/>
    <!-- small mind net on head -->
    <line x1="32" y1="12" x2="26" y2="16"/>
    <line x1="32" y1="12" x2="38" y2="16"/>
    <line x1="26" y1="16" x2="38" y2="16"/>
  </g>
  <g fill="currentColor">
    <circle cx="32" cy="12" r="3.2"/>
    <circle cx="26" cy="16" r="2.4"/>
    <circle cx="38" cy="16" r="2.4"/>
    <circle cx="32" cy="26" r="3"/>
    <circle cx="32" cy="34" r="3"/>
    <circle cx="18" cy="30" r="2.6"/>
    <circle cx="46" cy="30" r="2.6"/>
    <circle cx="22" cy="48" r="2.8"/>
    <circle cx="42" cy="48" r="2.8"/>
  </g>
</svg>
